name: Update China IP Lists

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ip-lists:
    runs-on: ubuntu-latest

    steps:
      # 1. 升级为 v5 版本以支持最新的 Node.js 运行环境
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      # 2. 下载 Loyalsoldier/geoip 的 cn.txt 文本文件
      - name: Fetch raw CN IP list
        run: |
          echo "正在从 Loyalsoldier/geoip 下载最新的 cn.txt..."
          curl -sSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" -o raw_cn.txt

      # 3. 使用 Python 将 IPv4 与 IPv6 精准分离
      - name: Split IPv4 and IPv6
        run: |
          python3 -c "
          import ipaddress

          ipv4_list = []
          ipv6_list = []

          with open('raw_cn.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  try:
                      net = ipaddress.ip_network(line, strict=False)
                      if net.version == 4:
                          ipv4_list.append(line)
                      elif net.version == 6:
                          ipv6_list.append(line)
                  except ValueError:
                      pass

          with open('ipv4-cn.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(ipv4_list) + '\n')

          with open('ipv6-cn.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(ipv6_list) + '\n')

          print(f'分类完成：提取到 {len(ipv4_list)} 条 IPv4 网段，{len(ipv6_list)} 条 IPv6 网段。')
          "
          rm raw_cn.txt

      # 4. 提交并推送到 main 分支
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ipv4-cn.txt ipv6-cn.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "检测到 IP 列表有更新，开始提交..."
            git commit -m "chore: 自动更新 CN IPv4/IPv6 列表 ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push origin main
          else
            echo "内容未发生变化，无需提交。"
          fi
